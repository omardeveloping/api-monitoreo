services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_SQLITE_PATH: "${DJANGO_SQLITE_PATH:-/data/db.sqlite3}"
      ESPACIO_DISCO_RUTAS: "${ESPACIO_DISCO_RUTAS:-/,/host-data,/host-backup}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      GUNICORN_CMD_ARGS: "--timeout 600 --graceful-timeout 60"
      VIDEOS_IMPORT_DIR: "${VIDEOS_IMPORT_DIR:-/data/windows_share/videos_MDVR}"
      FORZAR_TRANSCODIFICACION_MP4: "${FORZAR_TRANSCODIFICACION_MP4:-1}"
      MP4_VIDEO_PROFILE: "${MP4_VIDEO_PROFILE:-baseline}"
      MP4_VIDEO_LEVEL: "${MP4_VIDEO_LEVEL:-4.1}"
      MP4_TARGET_FPS: "${MP4_TARGET_FPS:-25}"
    volumes:
      - .:/app
      - sqlite_data:/data
      - "${ESPACIO_DISCO_DATA_HOST:-/data}:/host-data:ro"
      - "${ESPACIO_DISCO_BACKUP_HOST:-/backup}:/host-backup:ro"
      - "${VIDEOS_IMPORT_DIR_HOST:-/data/windows_share/videos_MDVR}:/data/windows_share/videos_MDVR:ro"
    depends_on:
      - redis

  celery:
    build: .
    restart: unless-stopped
    command: celery -A apiMonitoreo worker -l info -Q celery -c 2 --prefetch-multiplier=1
    env_file: .env
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_SQLITE_PATH: "${DJANGO_SQLITE_PATH:-/data/db.sqlite3}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      MDVR_IMPORT_SOFT_TIME_LIMIT: "${MDVR_IMPORT_SOFT_TIME_LIMIT:-7200}"
      MDVR_IMPORT_TIME_LIMIT: "${MDVR_IMPORT_TIME_LIMIT:-7800}"
      VIDEOS_IMPORT_DIR: "${VIDEOS_IMPORT_DIR:-/data/windows_share/videos_MDVR}"
      FORZAR_TRANSCODIFICACION_MP4: "${FORZAR_TRANSCODIFICACION_MP4:-1}"
      MP4_VIDEO_PROFILE: "${MP4_VIDEO_PROFILE:-baseline}"
      MP4_VIDEO_LEVEL: "${MP4_VIDEO_LEVEL:-4.1}"
      MP4_TARGET_FPS: "${MP4_TARGET_FPS:-25}"
    volumes:
      - .:/app
      - sqlite_data:/data
      - "${VIDEOS_IMPORT_DIR_HOST:-/data/windows_share/videos_MDVR}:/data/windows_share/videos_MDVR:ro"
    depends_on:
      - redis

  celery-mdvr:
    build: .
    restart: unless-stopped
    command: celery -A apiMonitoreo worker -l info -Q mdvr -c 1 --prefetch-multiplier=1 --max-tasks-per-child=5
    env_file: .env
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_SQLITE_PATH: "${DJANGO_SQLITE_PATH:-/data/db.sqlite3}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      MDVR_IMPORT_SOFT_TIME_LIMIT: "${MDVR_IMPORT_SOFT_TIME_LIMIT:-7200}"
      MDVR_IMPORT_TIME_LIMIT: "${MDVR_IMPORT_TIME_LIMIT:-7800}"
      VIDEOS_IMPORT_DIR: "${VIDEOS_IMPORT_DIR:-/data/windows_share/videos_MDVR}"
      FORZAR_TRANSCODIFICACION_MP4: "${FORZAR_TRANSCODIFICACION_MP4:-1}"
      MP4_VIDEO_PROFILE: "${MP4_VIDEO_PROFILE:-baseline}"
      MP4_VIDEO_LEVEL: "${MP4_VIDEO_LEVEL:-4.1}"
      MP4_TARGET_FPS: "${MP4_TARGET_FPS:-25}"
    volumes:
      - .:/app
      - sqlite_data:/data
      - "${VIDEOS_IMPORT_DIR_HOST:-/data/windows_share/videos_MDVR}:/data/windows_share/videos_MDVR:ro"
    depends_on:
      - redis

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A apiMonitoreo beat -l info
    env_file: .env
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_SQLITE_PATH: "${DJANGO_SQLITE_PATH:-/data/db.sqlite3}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      MDVR_IMPORT_SOFT_TIME_LIMIT: "${MDVR_IMPORT_SOFT_TIME_LIMIT:-7200}"
      MDVR_IMPORT_TIME_LIMIT: "${MDVR_IMPORT_TIME_LIMIT:-7800}"
      VIDEOS_IMPORT_DIR: "${VIDEOS_IMPORT_DIR:-/data/windows_share/videos_MDVR}"
      FORZAR_TRANSCODIFICACION_MP4: "${FORZAR_TRANSCODIFICACION_MP4:-1}"
      MP4_VIDEO_PROFILE: "${MP4_VIDEO_PROFILE:-baseline}"
      MP4_VIDEO_LEVEL: "${MP4_VIDEO_LEVEL:-4.1}"
      MP4_TARGET_FPS: "${MP4_TARGET_FPS:-25}"
    volumes:
      - .:/app
      - sqlite_data:/data
      - "${VIDEOS_IMPORT_DIR_HOST:-/data/windows_share/videos_MDVR}:/data/windows_share/videos_MDVR:ro"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  sqlite_data:
